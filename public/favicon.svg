<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Background -->
  <rect width="256" height="256" fill="#FFDE59"/>
  
  <!-- Black border -->
  <rect x="0" y="0" width="256" height="256" fill="none" stroke="#000000" stroke-width="8"/>
  
  <!-- Ruler icon -->
  <g transform="translate(128, 128)">
    <!-- Main ruler body -->
    <rect x="-60" y="-20" width="120" height="40" fill="#000000" stroke="#000000" stroke-width="2"/>
    
    <!-- Ruler markings -->
    <line x1="-60" y1="-20" x2="-60" y2="20" stroke="#FFDE59" stroke-width="3"/>
    <line x1="-45" y1="-20" x2="-45" y2="0" stroke="#FFDE59" stroke-width="2"/>
    <line x1="-30" y1="-20" x2="-30" y2="20" stroke="#FFDE59" stroke-width="3"/>
    <line x1="-15" y1="-20" x2="-15" y2="0" stroke="#FFDE59" stroke-width="2"/>
    <line x1="0" y1="-20" x2="0" y2="20" stroke="#FFDE59" stroke-width="3"/>
    <line x1="15" y1="-20" x2="15" y2="0" stroke="#FFDE59" stroke-width="2"/>
    <line x1="30" y1="-20" x2="30" y2="20" stroke="#FFDE59" stroke-width="3"/>
    <line x1="45" y1="-20" x2="45" y2="0" stroke="#FFDE59" stroke-width="2"/>
    <line x1="60" y1="-20" x2="60" y2="20" stroke="#FFDE59" stroke-width="3"/>
  </g>
</svg>
